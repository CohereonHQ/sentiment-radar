vix:
  name: "VIX"
  full_name: "CBOE Volatility Index"
  source: "CBOE"
  url: "https://api.cboe.com/vixcurrent"
  method: "api"
  cadence: "realtime"
  description: "Measures SPX implied volatility — the classic fear gauge. Spikes above 45 signal elevated stress."
  historical_available: true

fear_greed:
  name: "Fear & Greed Index"
  full_name: "CNN Money Fear & Greed Index"
  source: "CNN"
  url: "https://money.cnn.com/fear-and-greed/"
  method: "scrape"
  cadence: "daily"
  description: "Crowdsourced + behavioral mix. 0-100 scale, updated daily."
  historical_available: true

putcall:
  name: "Equity Put/Call Ratio"
  full_name: "CBOE Equity Put/Call Ratio"
  source: "CBOE"
  url: "https://api.cboe.com/putcallcurrent"
  method: "api"
  cadence: "daily"
  description: "Put volume / Call volume. >1.2 = fear (buy signal), <0.8 = greed (sell signal)."
  historical_available: true

skew:
  name: "CBOE SKEW Index"
  full_name: "CBOE SKEW Index"
  source: "CBOE"
  url: "https://api.cboe.com/skewcurrent"
  method: "api"
  cadence: "realtime"
  description: "Measures tail-risk paranoia. >130 = extreme crash fear."
  historical_available: true

aaii:
  name: "AAII Sentiment Survey"
  full_name: "AAII Investor Sentiment Survey"
