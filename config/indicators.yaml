  url: "https://www.aaii.com/sentiments/sentiments_history"
  method: "scrape"
  cadence: "weekly"
  description: "Weekly retail investor bullish/bearish/neutral. Contrarian at extremes."
  historical_available: true

hy_spreads:
  name: "HY Credit Spreads"
  full_name: "ICE BofA US High Yield Index Option-Adjusted Spread"
