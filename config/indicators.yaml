vix_term_structure:
  name: "VIX Term Structure"
  full_name: "VIX Futures Curve"
  source: "CBOE"
  url: "https://api.cboe.com/vixcurrent"
  method: "api"
  cadence: "realtime"
  description: "Contango = normal, backwardation = stress. Backwardation precedes drawdowns."
  historical_available: true