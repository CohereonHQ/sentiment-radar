  method: "csv"
  cadence: "daily"
  description: "High yield spread. Widens = stress, tightens = complacency."
  historical_available: true

dxy:
  name: "DXY Dollar Index"
  full_name: "US Dollar Index"
  source: "Yahoo Finance"
  url: "https://query1.finance.yahoo.com/v8/finance/chart/DX-Y.NYB"
  method: "api"
  cadence: "realtime"
  description: "Strong dollar = risk-off, weak dollar = risk-on."
  historical_available: true

gold:
  name: "Gold (XAU/USD)"
  full_name: "Gold Spot Price"
  source: "Yahoo Finance"
  url: "https://query1.finance.yahoo.com/v8/finance/chart/GC%3DF"
  method: "api"
  cadence: "realtime"
  description: "Safe haven. Spikes on crisis fear."
  historical_available: true

margin_debt:
  name: "FINRA Margin Debt"
  full_name: "FINRA Investor Margin Debt"
